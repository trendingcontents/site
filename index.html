<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #000;
    color: #fff;
}

/* VIDEO BACKGROUND */
.video-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(20,0,30,0.9));
    z-index: -1;
}

/* HERO */
.hero {
    text-align: center;
    padding: 30px 15px;
}

.hero h1 {
    font-size: 2rem;
    background: linear-gradient(45deg, #ff007a, #ff2a00);
    -webkit-background-clip: text;
    color: transparent;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 12px 26px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #ff007a, #ff2a00);
    color: #fff;
    box-shadow: 0 0 25px rgba(255,0,122,0.7);
}

/* CHAT */
.chat {
    margin: 20px auto;
    width: 95%;
    max-width: 340px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 15px;
    border-radius: 15px;
}

.msg {
    margin: 8px 0;
    padding: 8px 12px;
    border-radius: 12px;
    max-width: 80%;
    font-size: 0.85rem;
}

.left { background: rgba(255,255,255,0.1); }
.right {
    background: linear-gradient(45deg, #ff007a, #ff2a00);
    margin-left: auto;
}

/* TRENDING */
.trending {
    text-align: center;
    padding: 30px 10px;
}

.trending h2 {
    margin-bottom: 20px;
}

.trend-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.trend-card {
    min-width: 110px;
    height: 190px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 0 25px rgba(255,0,122,0.25);
    transition: 0.3s;
}

.trend-card img,
.trend-card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.trend-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255,0,122,0.6);
}
</style>
</head>

<body>

<video autoplay muted loop playsinline class="video-bg">
    <source src="vid_bg.mp4" type="video/mp4">

<div class="overlay"></div>

<section class="hero">

    </a>

</section>

<section class="trending">
    <h2>🔥 Trending Now</h2>

    <div class="trend-row">
        <div class="trend-card"><img src="2.jpg"></div>
        <div class="trend-card">
            <video autoplay muted loop playsinline>
                <source src="mid.mp4" type="video/mp4">
            </video>
        </div>
        <div class="trend-card"><img src="3.jpg"></div>
    </div>
</section>

<script>
const chatData = [
    {text: "Hey… you opened something you won’t forget 😏", side: "left"},
    {text: "What’s inside?", side: "right"},
    {text: "Something addictive… once you start, you won’t stop 🔥", side: "left"},
    {text: "Now I’m curious", side: "right"},
    {text: "Tap download… I’ll show you everything 💋", side: "left"}
];

let i = 0;

function typeChat() {
    if (i >= chatData.length) return;

    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.className = "msg " + chatData[i].side;

    let text = chatData[i].text;
    let j = 0;

    const typing = setInterval(() => {
        msg.textContent += text[j];
        j++;

        if (j >= text.length) {
            clearInterval(typing);
            i++;
            setTimeout(typeChat, 500);
        }
    }, 25);

    chatBox.appendChild(msg);
}

window.onload = () => {
    setTimeout(typeChat, 600);
};
</script>
